spring.application.name=analyzer
spring.config.import=optional:file:.env.properties

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/skillgap_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET}
jwt.expiration_ms=86400000

ollama.base-url=${OLLAMA_URL:http://localhost:11434}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.port=8080

